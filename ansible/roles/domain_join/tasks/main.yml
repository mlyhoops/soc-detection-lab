---
- name: Set DNS to dc01 before joining domain
  ansible.windows.win_shell: |
    $adapter = Get-NetAdapter | Where-Object { $_.Status -eq "Up" } | Select-Object -First 1
    Set-DnsClientServerAddress -InterfaceIndex $adapter.InterfaceIndex -ServerAddresses 10.10.10.10

- name: Join domain
  microsoft.ad.membership:
    dns_domain_name: lab.local
    domain_admin_user: "LAB\\Administrator"
    domain_admin_password: "{{ windows_admin_password }}"
    state: domain
  register: domain_join

- name: Reboot to complete domain join
  ansible.windows.win_reboot:
    reboot_timeout: 300
  when: domain_join.reboot_required
