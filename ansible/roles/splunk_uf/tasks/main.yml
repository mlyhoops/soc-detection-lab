---
# splunk_uf/files/ must contain the Splunk UF MSI before running this role.
# Download from splunk.com (free account) and place at:
#   ansible/roles/splunk_uf/files/splunkforwarder.msi

- name: Ensure C:\Temp exists
  ansible.windows.win_file:
    path: C:\Temp
    state: directory

- name: Copy Splunk UF installer
  ansible.windows.win_copy:
    src: splunkforwarder-10.4.0-f798d4d49089-windows-x64.msi
    dest: C:\Temp\splunkforwarder.msi

- name: Install Splunk Universal Forwarder
  ansible.windows.win_package:
    path: C:\Temp\splunkforwarder.msi
    state: present
    arguments: >-
      RECEIVING_INDEXER="192.168.0.53:9997"
      WINEVENTLOG_SEC_ENABLE=1
      WINEVENTLOG_SYS_ENABLE=1
      WINEVENTLOG_APP_ENABLE=1
      AGREETOLICENSE=Yes
      /quiet

- name: Wait for SplunkForwarder service
  ansible.windows.win_shell: Get-Service -Name SplunkForwarder -ErrorAction Stop
  retries: 10
  delay: 5
  register: uf_svc
  until: uf_svc.rc == 0

- name: Write inputs.conf (Windows Event Logs + Sysmon)
  ansible.windows.win_copy:
    dest: 'C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf'
    content: |
      [WinEventLog://Security]
      index = wineventlog
      disabled = false

      [WinEventLog://System]
      index = wineventlog
      disabled = false

      [WinEventLog://Application]
      index = wineventlog
      disabled = false

      [WinEventLog://Microsoft-Windows-Sysmon/Operational]
      index = sysmon
      disabled = false
      renderXml = true

- name: Add SplunkForwarder to Event Log Readers (required for Sysmon channel)
  ansible.windows.win_shell: |
    Add-LocalGroupMember -Group 'Event Log Readers' -Member 'NT SERVICE\SplunkForwarder' -ErrorAction SilentlyContinue

- name: Cold restart SplunkForwarder to pick up config and group membership
  ansible.windows.win_shell: |
    Stop-Service SplunkForwarder -Force
    Start-Sleep -Seconds 3
    Start-Service SplunkForwarder
  register: uf_restart

- name: Ensure SplunkForwarder is set to auto-start
  ansible.windows.win_service:
    name: SplunkForwarder
    start_mode: auto
