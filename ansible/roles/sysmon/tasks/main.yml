---
- name: Create Sysmon directory
  ansible.windows.win_file:
    path: C:\Tools\Sysmon
    state: directory

- name: Download Sysmon from Sysinternals
  ansible.windows.win_get_url:
    url: https://download.sysinternals.com/files/Sysmon.zip
    dest: C:\Tools\Sysmon\Sysmon.zip

- name: Extract Sysmon
  community.windows.win_unzip:
    src: C:\Tools\Sysmon\Sysmon.zip
    dest: C:\Tools\Sysmon
    delete_archive: false

- name: Copy Sysmon config
  ansible.windows.win_copy:
    src: sysmonconfig.xml
    dest: C:\Tools\Sysmon\sysmonconfig.xml

- name: Install Sysmon with config (idempotent)
  ansible.windows.win_shell: |
    $svc = Get-Service -Name Sysmon64 -ErrorAction SilentlyContinue
    if ($svc) {
      C:\Tools\Sysmon\Sysmon64.exe -c C:\Tools\Sysmon\sysmonconfig.xml
    } else {
      C:\Tools\Sysmon\Sysmon64.exe -accepteula -i C:\Tools\Sysmon\sysmonconfig.xml
    }
  register: sysmon_install
  changed_when: true

- name: Ensure Sysmon service is running
  ansible.windows.win_service:
    name: Sysmon64
    state: started
    start_mode: auto
